spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      minimum-idle: 5
      keepalive-time: 30000
      idle-timeout: 60000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true

  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: WARN
    org.springframework.security: WARN
    com.pricehawl.service.MultiPlatformPriceRefreshService: INFO
    com.pricehawl.service.crawler: INFO

pricehawk:
  debug:
    price-refresh-dir: ${PRICE_REFRESH_DEBUG_DIR:./debug/price-refresh}

  scheduler:
    price-refresh:
      enabled: ${PRICE_REFRESH_SCHEDULER_ENABLED:false}
      cron: "0 */15 * * * *"
      zone: "Asia/Bangkok"
      max-items-per-run: 50

  crawler:
    watsons-script: ${WATSONS_SCRIPT:backend/watsons-price.js}
    cocolux-script: ${COCOLUX_SCRIPT:backend/cocolux-price.js}
    thread-pool-size: 5

resend:
  api-key: ${RESEND_API_KEY:}

ai:
  base-url: ${AI_BASE_URL:https://generativelanguage.googleapis.com}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:gemini-2.5-flash}
  enable-search: ${AI_ENABLE_SEARCH:true}

accesstrade:
  api-key: ${ACCESSTRADE_API_KEY:}

supabase:
  url: ${SUPABASE_URL}
  api:
    key: ${SUPABASE_API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        hikaricp.connections.usage: true