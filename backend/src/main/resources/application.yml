spring:
  datasource:
    url: jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require
    username: "postgres.astkanfsacxriwprspqr"
    password: "PriceHawl123@"
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 10000
      max-lifetime: 30000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

logging:
  level:
    root: DEBUG
    com.pricehawl.service.CocoluxPriceCrawlerService: DEBUG
    com.pricehawl.service.PriceRefreshScheduler: INFO
    com.pricehawl.service.PriceRefreshServiceImpl: DEBUG
  file:
    name: logs/app.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

pricehawk:
  crawler:
    node-binary: ${PRICEHAWK_NODE_BINARY:npx.cmd}
    cocolux-refresh-script: ${PRICEHAWK_COCOLUX_REFRESH_SCRIPT}
    timeout-seconds: ${PRICEHAWK_CRAWLER_TIMEOUT_SECONDS:90}

  debug:
    price-refresh-dir: ${PRICEHAWK_DEBUG_PRICE_REFRESH_DIR:debug/price-refresh}

  scheduler:
    price-refresh:
      enabled: ${PRICEHAWK_SCHEDULER_ENABLED:true}
      cron: ${PRICEHAWK_SCHEDULER_CRON:0 */30 * * * *}
      zone: ${PRICEHAWK_SCHEDULER_ZONE:Asia/Bangkok}
