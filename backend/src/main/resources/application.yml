spring:
  datasource:
    url: jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require
    username: "postgres.astkanfsacxriwprspqr"
    password: "PriceHawl123@"
    driver-class-name: org.postgresql.Driver

    hikari:
      # Tăng số lượng kết nối để không phải xếp hàng chờ (Queueing)
      maximum-pool-size: 6
      minimum-idle: 5
      # CỰC KỲ QUAN TRỌNG: Giữ kết nối luôn "nóng" sang Hàn Quốc để giảm ping
      keepalive-time: 30000 
      idle-timeout: 60000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        # Tối ưu hóa việc lấy dữ liệu hàng loạt
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true

  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: backend

server:
  port: 8080

logging:
  level:
    root: WARN
    org.springframework.security: WARN
    # INFO giúp tránh nghẽn I/O hơn so với DEBUG khi hệ thống chạy thực tế
    com.pricehawl.service.MultiPlatformPriceRefreshService: INFO
    com.pricehawl.service.crawler: INFO

pricehawk:
  cors:
    allowed-origins: "http://localhost:5173,http://localhost:80,http://localhost:8824,http://127.0.0.1:80,http://127.0.0.1:8824,http://192.168.1.57:80,http://192.168.1.57:8824,http://pricehawk.site:80,http://pricehawk.site:8824,http://www.pricehawk.site:80,http://www.pricehawk.site:8824"
  debug:
    price-refresh-dir: "./debug/price-refresh"

  scheduler:
    price-refresh:
      enabled: false
      cron: "0 */15 * * * *"
      zone: "Asia/Bangkok"
      max-items-per-run: 50

  crawler:
    watsons-script: "watsons-price.js"
    cocolux-script: "cocolux-price.js"
    thread-pool-size: 5

