version: '3.8'

# ============================================================
# Cross-platform notes:
# - Windows dev + Ubuntu prod: tất cả services dưới đây chạy được
# - node-exporter (Linux system metrics): chỉ Ubuntu → profile=linux
# - windows_exporter (Windows system metrics): NATIVE binary trên host,
#   không chạy trong Docker; Prometheus scrape qua host.docker.internal:9182
# - host.docker.internal: tự resolve trên Windows/Mac Docker Desktop
#   Ubuntu: cần extra_hosts (đã config sẵn bên dưới)
# ============================================================

services:
  # ── Prometheus ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: pricehawk-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_DAYS:-15}d'
      - '--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-10GB}'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.3
    container_name: pricehawk-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      # grafana-piechart-panel đã built-in từ Grafana 8+, KHÔNG cài lại
      - GF_INSTALL_PLUGINS=grafana-clock-panel

    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    depends_on:
      - prometheus
    networks:
      - monitoring
    restart: unless-stopped

  # ── Blackbox Exporter ────────────────────────────────────────
  # Probe HTTP endpoints → đo availability và latency từ ngoài
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: pricehawk-blackbox
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox/blackbox.yml:/config/blackbox.yml:ro
    command:
      - '--config.file=/config/blackbox.yml'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring
    restart: unless-stopped

  # ── Node Exporter ────────────────────────────────────────────
  # System metrics cho LINUX/UBUNTU (CPU, memory, disk, network)
  # Chỉ chạy khi: docker-compose --profile linux up -d
  # Trên Windows: dùng windows_exporter native (xem MONITORING.md § Windows Setup)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: pricehawk-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring
    restart: unless-stopped
    profiles:
      - linux

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local


networks:
  monitoring:
    driver: bridge
