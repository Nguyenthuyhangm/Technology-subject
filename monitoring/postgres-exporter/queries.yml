# Custom PostgreSQL queries for postgres_exporter
# Used to track slow queries and connection stats beyond default metrics
# Requires: pg_stat_statements extension enabled in Supabase/PostgreSQL
#   Enable in Supabase: Dashboard → SQL Editor → CREATE EXTENSION pg_stat_statements;

pg_slow_queries:
  query: |
    SELECT
      count(*) as slow_query_count,
      coalesce(max(now() - query_start), '0 seconds') as max_duration_seconds
    FROM pg_stat_activity
    WHERE state = 'active'
      AND now() - query_start > interval '500ms'
      AND query NOT ILIKE '%pg_stat_activity%'
  metrics:
    - slow_query_count:
        usage: "GAUGE"
        description: "Number of queries running > 500ms (slow query threshold)"
    - max_duration_seconds:
        usage: "GAUGE"
        description: "Duration of longest currently running query (seconds)"

pg_connection_stats:
  query: |
    SELECT
      count(*) FILTER (WHERE state = 'active') as active_connections,
      count(*) FILTER (WHERE state = 'idle') as idle_connections,
      count(*) FILTER (WHERE state = 'idle in transaction') as idle_in_transaction,
      count(*) as total_connections,
      (SELECT setting::int FROM pg_settings WHERE name = 'max_connections') as max_connections
    FROM pg_stat_activity
    WHERE datname = current_database()
  metrics:
    - active_connections:
        usage: "GAUGE"
        description: "Active database connections"
    - idle_connections:
        usage: "GAUGE"
        description: "Idle database connections"
    - idle_in_transaction:
        usage: "GAUGE"
        description: "Connections idle in transaction (potential lock holders)"
    - total_connections:
        usage: "GAUGE"
        description: "Total database connections"
    - max_connections:
        usage: "GAUGE"
        description: "Maximum allowed connections (max_connections setting)"

pg_table_bloat:
  query: |
    SELECT
      schemaname,
      tablename,
      pg_size_pretty(pg_total_relation_size(schemaname||'.'||tablename)) as total_size,
      n_live_tup,
      n_dead_tup,
      CASE WHEN n_live_tup > 0
        THEN round(100 * n_dead_tup / n_live_tup)
        ELSE 0
      END as dead_tuple_ratio
    FROM pg_stat_user_tables
    WHERE n_dead_tup > 1000
    ORDER BY n_dead_tup DESC
    LIMIT 10
  metrics:
    - n_live_tup:
        usage: "GAUGE"
        description: "Live tuples in table"
        labels: ["schemaname", "tablename"]
    - n_dead_tup:
        usage: "GAUGE"
        description: "Dead tuples in table (needs VACUUM)"
        labels: ["schemaname", "tablename"]
    - dead_tuple_ratio:
        usage: "GAUGE"
        description: "Percentage of dead tuples (bloat indicator)"
        labels: ["schemaname", "tablename"]
