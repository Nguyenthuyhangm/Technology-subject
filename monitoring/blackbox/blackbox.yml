modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 201, 202, 204, 301, 302, 304, 307, 308]
      method: GET
      follow_redirects: true
      fail_if_ssl: false
      # fail_if_matches_regexp với "error"/"Error" bị xóa:
      # regex quá rộng, match vào JSON response bình thường (vd: {"error":null})
      # gây probe FAIL sai ngay cả khi backend đang UP

  http_post_2xx:
    prober: http
    timeout: 5s
    http:
      valid_status_codes: [200, 201, 202, 204]
      method: POST

  tcp_connect:
    prober: tcp
    timeout: 5s

  ssh_banner:
    prober: tcp
    timeout: 5s
    tcp:
      query_response:
        - expect: "^SSH-2.0-"
        - send: "SSH-2.0-blackbox-exporter"

  icmp:
    prober: icmp
    timeout: 5s
    icmp:
      preferred_ip_protocol: "ip4"
