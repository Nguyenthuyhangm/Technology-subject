groups:
  # ============================================================
  # FRONTEND ALERTS
  # Requires frontend SDK integration (see MONITORING.md)
  # ============================================================
  - name: frontend_alerts
    interval: 1m
    rules:
      - alert: FrontendSlowPageLoad
        expr: histogram_quantile(0.95, rate(frontend_page_load_seconds_bucket[5m])) > 3
        for: 5m
        labels:
          severity: warning
          layer: frontend
        annotations:
          summary: "Frontend page load time p95 > 3s"
          description: "P95 page load = {{ $value | humanizeDuration }}. Kiểm tra bundle size và CDN."

      - alert: FrontendHighAPIErrorRate
        expr: >
          (
            rate(frontend_api_errors_total[5m])
            / rate(frontend_api_requests_total[5m])
          ) * 100 > 5
        for: 5m
        labels:
          severity: warning
          layer: frontend
        annotations:
          summary: "Frontend API error rate > 5%"
          description: "Error rate = {{ $value | humanize }}%. Kiểm tra backend API."

      - alert: FrontendHighJSErrorRate
        expr: rate(frontend_js_errors_total[1m]) * 60 > 10
        for: 5m
        labels:
          severity: warning
          layer: frontend
        annotations:
          summary: "Frontend JS error rate > 10/min"
          description: "JS error rate = {{ $value | humanize }}/min. Kiểm tra console errors."

  # ============================================================
  # BACKEND ALERTS
  # Source: Spring Boot Actuator /actuator/prometheus
  # ============================================================
  - name: backend_alerts
    interval: 1m
    rules:
      - alert: BackendDown
        expr: up{job="backend-api"} == 0
        for: 2m
        labels:
          severity: critical
          layer: backend
        annotations:
          summary: "Backend API DOWN"
          description: "Backend Spring Boot không phản hồi trong 2 phút. Kiểm tra logs ngay."

      - alert: BackendHighResponseTime
        expr: >
          histogram_quantile(0.95,
            rate(http_server_requests_seconds_bucket{job="backend-api"}[5m])
          ) > 1
        for: 5m
        labels:
          severity: warning
          layer: backend
        annotations:
          summary: "Backend API response time p95 > 1s"
          description: "P95 = {{ $value | humanizeDuration }}. Kiểm tra DB queries và Elasticsearch."

      - alert: BackendHigh5xxCount
        expr: increase(http_server_requests_seconds_count{job="backend-api",status=~"5.."}[1m]) > 2
        for: 5m
        labels:
          severity: critical
          layer: backend
        annotations:
          summary: "Backend HTTP 5xx errors > 2/min"
          description: "5xx count = {{ $value | humanize }}/min. Kiểm tra backend logs ngay."

      - alert: BackendHigh4xxRate
        expr: >
          (
            rate(http_server_requests_seconds_count{job="backend-api",status=~"4.."}[5m])
            / rate(http_server_requests_seconds_count{job="backend-api"}[5m])
          ) * 100 > 10
        for: 5m
        labels:
          severity: warning
          layer: backend
        annotations:
          summary: "Backend HTTP 4xx rate > 10%"
          description: "4xx rate = {{ $value | humanize }}%. Kiểm tra client requests."

      - alert: BackendHighActiveConnections
        expr: hikaricp_connections_active{job="backend-api"} > hikaricp_connections_max{job="backend-api"} * 0.8
        for: 5m
        labels:
          severity: warning
          layer: backend
        annotations:
          summary: "Active DB connections > 80% pool"
          description: "Active = {{ $value | humanize }} connections. Cân nhắc tăng pool size."

  # ============================================================
  # SYSTEM ALERTS — Cross-platform
  # Linux  → node-exporter  (metrics: node_*)
  # Windows → windows_exporter (metrics: windows_*)
  # Cả hai đều hoạt động song song; chỉ máy đang chạy mới có data
  # ============================================================
  - name: system_alerts
    interval: 1m
    rules:
      - alert: HighCPUUsage
        expr: >
          (
            100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
          ) > 80
          OR
          (
            100 - (avg by(instance)(rate(windows_cpu_time_total{mode="idle"}[5m])) * 100)
          ) > 80
        for: 5m
        labels:
          severity: warning
          layer: system
        annotations:
          summary: "CPU usage > 80% sustained"
          description: "CPU = {{ $value | humanize }}% on {{ $labels.instance }}. Kiểm tra process nào tiêu tốn CPU."

      - alert: HighMemoryUsage
        expr: >
          (
            (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100
          ) > 85
          OR
          (
            (1 - (windows_memory_available_bytes / windows_os_visible_memory_bytes)) * 100
          ) > 85
        for: 5m
        labels:
          severity: warning
          layer: system
        annotations:
          summary: "Memory usage > 85%"
          description: "Memory = {{ $value | humanize }}%. Cân nhắc restart services hoặc tăng RAM."

      - alert: HighDiskUsage
        expr: >
          (
            (1 - (
              node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs|overlay|devtmpfs"}
              / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs|overlay|devtmpfs"}
            )) * 100
          ) > 85
          OR
          (
            (1 - (
              windows_logical_disk_free_bytes{volume=~"[A-Z]:"}
              / windows_logical_disk_size_bytes{volume=~"[A-Z]:"}
            )) * 100
          ) > 85
        for: 5m
        labels:
          severity: warning
          layer: system
        annotations:
          summary: "Disk usage > 85%"
          description: "Disk = {{ $value | humanize }}%. Cleanup hoặc expand disk."

      - alert: ProcessRestarted
        expr: changes(process_start_time_seconds{job="backend-api"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
          layer: system
        annotations:
          summary: "Backend process đã restart"
          description: "Backend Spring Boot vừa restart. Kiểm tra logs để tìm nguyên nhân."

  # ============================================================
  # INFRASTRUCTURE ALERTS
  # ============================================================
  - name: infrastructure_alerts
    interval: 1m
    rules:
      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 2m
        labels:
          severity: critical
          layer: infrastructure
        annotations:
          summary: "Prometheus monitoring DOWN"
          description: "Prometheus không phản hồi. Toàn bộ monitoring bị ảnh hưởng."

      - alert: JvmHeapNearFull
        expr: >
          (
            jvm_memory_used_bytes{job="backend-api",area="heap"}
            / jvm_memory_max_bytes{job="backend-api",area="heap"}
          ) * 100 > 85
        for: 5m
        labels:
          severity: warning
          layer: backend
        annotations:
          summary: "JVM Heap > 85%"
          description: "JVM heap = {{ $value | humanize }}%. Nguy cơ OutOfMemoryError."

      - alert: ElasticsearchSyncFailure
        expr: increase(elasticsearch_sync_errors_total[1h]) > 0
        for: 0m
        labels:
          severity: critical
          layer: backend
        annotations:
          summary: "Elasticsearch sync thất bại"
          description: "Sync job đã fail. Search results có thể lỗi thời."
