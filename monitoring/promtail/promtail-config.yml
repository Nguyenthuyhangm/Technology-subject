server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Backend application logs
  # Mount path trong docker-compose: BACKEND_LOG_PATH → /var/log/backend
  # Spring Boot cần config: logging.file.name=logs/app.log (trong application.yml)
  - job_name: backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: backend
          service: pricehawk-backend
          __path__: /var/log/backend/*.log

    # Pipeline: parse log format của Spring Boot
    pipeline_stages:
      # Detect log level từ format: "2024-01-01 10:00:00 INFO ..."
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d+)\s+(?P<level>[A-Z]+)\s+.*'
      - labels:
          level:
      # Filter bỏ DEBUG logs (chỉ giữ INFO, WARN, ERROR)
      - match:
          selector: '{level="DEBUG"}'
          action: drop
          drop_counter_reason: debug_filtered
